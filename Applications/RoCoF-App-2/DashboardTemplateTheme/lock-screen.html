<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock Screen - Nexus Admin</title>
    <link rel="stylesheet" href="assets/css/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
</head>
<body class="font-sans">

    <!-- Lock Screen Content -->
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-600 to-purple-700 p-4">
        <div class="max-w-md w-full">
            <!-- Lock Screen Card -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8">
                <!-- User Avatar -->
                <div class="text-center mb-6">
                    <div class="inline-block relative">
                        <img src="https://ui-avatars.com/api/?name=John+Doe&amp;background=0ea5e9&amp;color=fff&amp;size=128" alt="User" class="w-32 h-32 rounded-full border-4 border-primary-500 shadow-lg">
                        <div class="absolute bottom-2 right-2 w-6 h-6 bg-yellow-500 border-4 border-white dark:border-gray-800 rounded-full flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                    </div>
                    <h2 class="mt-4 text-2xl font-bold text-gray-900 dark:text-white">John Doe</h2>
                    <p class="text-gray-600 dark:text-gray-400">john@example.com</p>
                </div>

                <!-- Unlock Form -->
                <form class="space-y-4">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Enter Your Password</label>
                        <div class="relative">
                            <input type="password" id="password" placeholder="Enter password to unlock" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:bg-gray-700 dark:text-white">
                            <button type="button" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-3 px-4 bg-gradient-to-r from-primary-600 to-purple-600 text-white font-semibold rounded-lg hover:from-primary-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transform transition-all hover:scale-105">
                        <div class="flex items-center justify-center space-x-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                            </svg>
                            <span>Unlock</span>
                        </div>
                    </button>
                </form>

                <!-- Additional Options -->
                <div class="mt-6 text-center space-y-3">
                    <a href="login.html" class="block text-sm text-primary-600 hover:text-primary-700 dark:text-primary-400 dark:hover:text-primary-300">
                        Sign in as a different user
                    </a>
                    <div class="text-sm text-gray-500 dark:text-gray-400">
                        Locked since 10:30 AM
                    </div>
                </div>
            </div>

            <!-- Back to Login -->
            <div class="mt-6 text-center">
                <a href="index-2.html" class="text-white hover:text-gray-200 text-sm font-medium">
                    <svg class="w-5 h-5 inline-block mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    </div>
