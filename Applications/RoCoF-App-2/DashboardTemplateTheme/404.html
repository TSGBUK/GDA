<!DOCTYPE html>
<html lang="en" class="light">

 
<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found - Nexus Admin</title>
    <link rel="stylesheet" href="assets/css/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
</head>
<body class="font-sans">

    <!-- 404 Content -->
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-50 to-purple-50 dark:from-gray-900 dark:to-gray-800 p-4">
        <div class="max-w-2xl w-full text-center">
            <!-- 404 Illustration -->
            <div class="mb-8">
                <div class="text-9xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary-600 to-purple-600">
                    404
                </div>
                <div class="mt-4">
                    <svg class="w-64 h-64 mx-auto text-gray-300 dark:text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
            </div>

            <!-- Error Message -->
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-4">Page Not Found</h1>
                <p class="text-xl text-gray-600 dark:text-gray-400 mb-2">Sorry, we couldn't find the page you're looking for.</p>
                <p class="text-gray-500 dark:text-gray-500">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="index-2.html" class="inline-flex items-center justify-center px-6 py-3 bg-gradient-to-r from-primary-600 to-purple-600 text-white font-semibold rounded-lg hover:from-primary-700 hover:to-purple-700 transition-all transform hover:scale-105">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Go to Dashboard
                </a>
                <button onclick="history.back()" class="inline-flex items-center justify-center px-6 py-3 border-2 border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-semibold rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition-all">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Go Back
                </button>
            </div>

            <!-- Helpful Links -->
            <div class="mt-12">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">You might find these helpful:</p>
                <div class="flex flex-wrap gap-3 justify-center">
                    <a href="contact.html" class="text-sm text-primary-600 hover:text-primary-700 dark:text-primary-400 hover:underline">Contact Support</a>
                    <span class="text-gray-300 dark:text-gray-600">|</span>
                    <a href="blog.html" class="text-sm text-primary-600 hover:text-primary-700 dark:text-primary-400 hover:underline">Visit Blog</a>
                    <span class="text-gray-300 dark:text-gray-600">|</span>
                    <a href="settings.html" class="text-sm text-primary-600 hover:text-primary-700 dark:text-primary-400 hover:underline">Settings</a>
                </div>
            </div>
        </div>
    </div>
